<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation | Ghor Vinti Pujan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000000; /* Pure black background */
        }
        .font-luxury {
            font-family: 'Cinzel', serif;
        }
        .text-gold {
            background: linear-gradient(135deg, #FFE082 0%, #FFB300 50%, #FFA000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-stone-200 min-h-screen flex flex-col items-center justify-center p-6 md:p-12">

    <div class="text-center mb-12 space-y-1">
        <p class="font-luxury tracking-widest text-xs sm:text-sm text-amber-400 uppercase">|| Jai Jinendra ||</p>
        <p class="font-luxury tracking-wider text-[10px] sm:text-xs text-stone-400">|| Jai Shri Nakoda Parshvanathaya Namah ||</p>
    </div>

    <main class="w-full max-w-xl text-center space-y-10 my-auto">
        
        <div class="space-y-2">
            <span class="text-xs uppercase tracking-[0.3em] text-stone-500 font-medium block">Invitation</span>
            <h1 class="font-luxury text-4xl md:text-5xl font-bold text-gold tracking-wide">Ghor Vinti Pujan</h1>
        </div>

        <div class="py-2 text-center">
            <div class="grid grid-cols-4 gap-4 max-w-xs mx-auto">
                <div>
                    <span id="days" class="block font-luxury font-bold text-2xl text-amber-300">00</span>
                    <span class="text-[9px] text-stone-500 uppercase tracking-wider">Days</span>
                </div>
                <div>
                    <span id="hours" class="block font-luxury font-bold text-2xl text-amber-300">00</span>
                    <span class="text-[9px] text-stone-500 uppercase tracking-wider">Hours</span>
                </div>
                <div>
                    <span id="minutes" class="block font-luxury font-bold text-2xl text-amber-300">00</span>
                    <span class="text-[9px] text-stone-500 uppercase tracking-wider">Mins</span>
                </div>
                <div>
                    <span id="seconds" class="block font-luxury font-bold text-2xl text-amber-300">00</span>
                    <span class="text-[9px] text-stone-500 uppercase tracking-wider">Secs</span>
                </div>
            </div>
        </div>

        <div class="space-y-6 text-sm sm:text-base max-w-md mx-auto text-left border-t border-stone-900 pt-8">
            <div class="grid grid-cols-3 gap-2">
                <span class="font-medium text-amber-400 font-luxury tracking-wider text-xs uppercase pt-0.5">Date</span>
                <span class="text-stone-300 col-span-2">Sunday, 28 June 2026</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <span class="font-medium text-amber-400 font-luxury tracking-wider text-xs uppercase pt-0.5">Time</span>
                <span class="text-stone-300 col-span-2">9 AM onwards</span>
            </div>
            <div class="grid grid-cols-3 gap-2 items-start">
                <span class="font-medium text-amber-400 font-luxury tracking-wider text-xs uppercase pt-1">Venue</span>
                <div class="col-span-2 space-y-4">
                    <a href="https://maps.app.goo.gl/iWuiDmxJyUB8sfbY7" target="_blank" class="text-stone-300 hover:text-amber-300 transition-colors inline-flex items-center gap-1.5 underline underline-offset-4 decoration-amber-500/40">
                        Click to Open Google Maps Location
                    </a>
                    
                    <div class="flex items-center gap-4 bg-stone-950 p-3 rounded-xl border border-stone-900 w-fit">
                        <div class="bg-white p-2 rounded-lg inline-block overflow-hidden shrink-0">
                            <!-- Updated to reference your new QR code file -->
                            <img src="PHOTO-2026-06-27-19-01-17.jpg" 
                                 alt="Venue Location QR Code" 
                                 class="w-[90px] h-[90px] block object-contain">
                        </div>
                        <div class="text-[11px] text-stone-500 max-w-[140px] leading-tight">
                            Scan this QR code with your smartphone camera to navigate directly to the venue.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pt-8 border-t border-stone-900 text-xs text-stone-500">
            <!-- Optional closing remarks can go here -->
        </div>
    </main>

</body>
</html>
